<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha</title>
    <link rel="stylesheet" href="style.css">
    <!-- Resolve os imports "react" / "react-dom/client" via CDN (funciona no GitHub Pages) -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18",
        "react-dom/client": "https://esm.sh/react-dom@18/client"
      }
    }
    </script>
</head>
<body>
    <div id="root"></div>
    <!-- Babel transpila o JSX no navegador; data-type="module" mantém os imports do import map -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-type="module" data-presets="react" src="script.js"></script>
</body>
</html>
